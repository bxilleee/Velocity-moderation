<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Velocity Moderation | Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #e2e8f0; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.4); border-radius: 1.25rem; padding: 1.5rem; }
        .active-tab { color: #818cf8 !important; border-top: 2px solid #818cf8; }
        @media (min-width: 768px) { .active-tab { border-top: none; border-left: 4px solid #818cf8; background: rgba(99, 102, 241, 0.1); } }
        select, input, textarea { background: #0f172a !important; border: 1px solid #334155 !important; border-radius: 0.75rem !important; padding: 0.75rem !important; outline: none; font-size: 0.875rem; width: 100%; }
        select:focus, input:focus { border-color: #6366f1 !important; ring: 2px #6366f1; }
    </style>
</head>
<body>

    <div class="flex flex-col md:flex-row h-screen overflow-hidden">
        <aside class="hidden md:flex w-72 bg-[#080c14] border-r border-slate-800 flex-col p-6">
            <div class="flex items-center gap-3 text-indigo-400 font-extrabold text-2xl mb-10">
                <i data-lucide="zap"></i> VELOCITY
            </div>
            <nav class="space-y-2">
                <button onclick="showTab('builder')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition"><i data-lucide="message-square"></i> Builder</button>
                <button onclick="showTab('mod')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition"><i data-lucide="shield-alert"></i> Moderation</button>
                <button onclick="showTab('logs')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition"><i data-lucide="activity"></i> Activity</button>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 md:p-10 pb-24">
            
            <section id="builder" class="max-w-4xl mx-auto space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-bold">Message Builder</h2>
                    <button onclick="socket.emit('getInitData')" class="text-indigo-400 p-2"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
                </div>
                <div class="glass-card space-y-4">
                    <label class="text-xs font-bold text-slate-500 uppercase">Target Channel</label>
                    <select class="channel-list"></select>
                    <textarea id="msgInput" oninput="updatePreview('preview', 'msgInput')" placeholder="Type your broadcast..." class="h-32 resize-none"></textarea>
                    <button onclick="sendMsg()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-500 transition">Send Broadcast</button>
                </div>
                <div class="bg-[#2b2d31] p-4 rounded-xl flex gap-4 border border-slate-700">
                    <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center font-bold italic">V</div>
                    <div>
                        <div class="font-bold text-white text-sm">Velocity <span class="bg-indigo-500 text-[8px] px-1 rounded ml-1">BOT</span></div>
                        <div id="preview" class="text-slate-300 text-sm mt-1">Awaiting input...</div>
                    </div>
                </div>
            </section>

            <section id="mod" class="hidden max-w-4xl mx-auto space-y-6">
                <h2 class="text-2xl font-bold">Velocity Security Suite</h2>

                <div class="glass-card space-y-6">
                    <div class="flex items-center gap-2 text-red-400 font-bold uppercase text-xs tracking-widest">
                        <i data-lucide="user-x" class="w-4 h-4"></i> User Enforcement
                    </div>
                    <div class="grid md:grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[10px] text-slate-500">TARGET USER</label>
                            <select class="user-list" id="modUser"></select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] text-slate-500">ENFORCEMENT REASON</label>
                            <input id="modReason" oninput="updatePreview('reasonPrev', 'modReason')" placeholder="Reason for action...">
                        </div>
                    </div>
                    <div class="bg-red-900/10 border border-red-500/20 p-3 rounded-lg text-xs italic text-red-300">
                        Preview: <span id="reasonPrev">No reason provided.</span>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                        <button onclick="modAction('warn')" class="bg-yellow-600/20 border border-yellow-600 text-yellow-500 p-2 rounded-lg text-[10px] font-bold">WARN</button>
                        <button onclick="modAction('kick')" class="bg-orange-600/20 border border-orange-600 text-orange-500 p-2 rounded-lg text-[10px] font-bold">KICK</button>
                        <button onclick="modAction('ban')" class="bg-red-600 text-white p-2 rounded-lg text-[10px] font-bold">BAN</button>
                        <button onclick="modAction('timeout')" class="bg-slate-700 p-2 rounded-lg text-[10px] font-bold">TIMEOUT</button>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400">TIMEOUT DURATION: <span id="timeVal" class="text-indigo-400">5m</span></label>
                        <input type="range" id="timeSlider" min="1" max="60" value="5" oninput="document.getElementById('timeVal').innerText = this.value + 'm'" class="accent-indigo-500">
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-6">
                    <div class="glass-card space-y-4">
                        <div class="flex items-center gap-2 text-indigo-400 font-bold uppercase text-xs tracking-widest">
                            <i data-lucide="hash" class="w-4 h-4"></i> Channel Lockdown
                        </div>
                        <select class="channel-list" id="lockChannel"></select>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="modAction('lock')" class="bg-red-600/20 text-red-500 border border-red-600/50 p-2 rounded-lg text-[10px] font-bold">LOCK</button>
                            <button onclick="modAction('unlock')" class="bg-green-600/20 text-green-500 border border-green-600/50 p-2 rounded-lg text-[10px] font-bold">UNLOCK</button>
                        </div>
                        <label class="text-[10px] text-slate-400">SLOWMODE: <span id="slowVal" class="text-indigo-400">0s</span></label>
                        <input type="range" id="slowSlider" min="0" max="120" value="0" oninput="document.getElementById('slowVal').innerText = this.value + 's'" class="accent-indigo-500">
                        <button onclick="modAction('slowmode')" class="w-full bg-slate-800 p-2 rounded-lg text-[10px] font-bold border border-slate-700">APPLY SLOWMODE</button>
                    </div>

                    <div class="glass-card space-y-4">
                        <div class="flex items-center gap-2 text-blue-400 font-bold uppercase text-xs tracking-widest">
                            <i data-lucide="mic-off" class="w-4 h-4"></i> Voice Ops
                        </div>
                        <select class="user-list" id="vcUser"></select>
                        <select class="vc-list" id="vcTarget"></select>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="modAction('move')" class="bg-blue-600 p-2 rounded-lg text-[10px] font-bold">MOVE VC</button>
                            <button onclick="modAction('disconnect')" class="bg-slate-700 p-2 rounded-lg text-[10px] font-bold">KICK VC</button>
                        </div>
                        <button onclick="modAction('mute')" class="w-full bg-yellow-600/20 text-yellow-500 border border-yellow-600/50 p-2 rounded-lg text-[10px] font-bold uppercase">Toggle Voice Mute</button>
                    </div>
                </div>
            </section>

            <section id="logs" class="hidden max-w-4xl mx-auto">
                <h2 class="text-2xl font-bold mb-4">Activity Stream</h2>
                <div id="logContainer" class="bg-black/40 border border-slate-800 rounded-2xl p-4 h-[60vh] overflow-y-auto font-mono text-xs space-y-2"></div>
            </section>
        </main>

        <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-[#080c14] border-t border-slate-800 flex justify-around items-center h-20 px-4 z-50 shadow-2xl">
            <button onclick="showTab('builder')" id="m-builder" class="flex flex-col items-center gap-1 text-slate-500"><i data-lucide="message-square"></i><span class="text-[8px] font-bold">BUILDER</span></button>
            <button onclick="showTab('mod')" id="m-mod" class="flex flex-col items-center gap-1 text-slate-500"><i data-lucide="shield-alert"></i><span class="text-[8px] font-bold">SAFETY</span></button>
            <button onclick="showTab('logs')" id="m-logs" class="flex flex-col items-center gap-1 text-slate-500"><i data-lucide="activity"></i><span class="text-[8px] font-bold">LOGS</span></button>
        </nav>
    </div>

    <script>
        const socket = io();
        lucide.createIcons();

        function updatePreview(prevId, inputId) {
            document.getElementById(prevId).innerText = document.getElementById(inputId).value || "Awaiting input...";
        }

        socket.on('connect', () => socket.emit('getInitData'));

        socket.on('initData', (data) => {
            // Update all dropdowns by class
            document.querySelectorAll('.channel-list').forEach(s => s.innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join(''));
            document.querySelectorAll('.user-list').forEach(s => s.innerHTML = data.members.map(m => `<option value="${m.id}">${m.tag}</option>`).join(''));
            document.querySelectorAll('.vc-list').forEach(s => s.innerHTML = data.vcs.map(v => `<option value="${v.id}">${v.name}</option>`).join(''));
        });

        function showTab(tab) {
            ['builder', 'mod', 'logs'].forEach(t => {
                document.getElementById(t).classList.add('hidden');
                document.getElementById(`m-${t}`).classList.remove('active-tab');
            });
            document.getElementById(tab).classList.remove('hidden');
            document.getElementById(`m-${tab}`).classList.add('active-tab');
        }

        function sendMsg() {
            const select = document.querySelector('#builder .channel-list');
            socket.emit('sendMessage', { channelId: select.value, content: document.getElementById('msgInput').value });
            document.getElementById('msgInput').value = '';
        }

        function modAction(type) {
            socket.emit('moderation', {
                type,
                userId: document.getElementById(type === 'move' || type === 'disconnect' || type === 'mute' ? 'vcUser' : 'modUser').value,
                channelId: document.getElementById(type === 'lock' || type === 'unlock' || type === 'slowmode' || type === 'warn' ? 'lockChannel' : 'builder').value,
                vcId: document.getElementById('vcTarget').value,
                reason: document.getElementById('modReason').value,
                time: document.getElementById('timeSlider').value,
                slow: document.getElementById('slowSlider').value
            });
        }

        socket.on('discordMessage', (msg) => {
            const log = document.getElementById('logContainer');
            const d = document.createElement('div');
            d.innerHTML = `<span class="text-indigo-400">[#${msg.channel}]</span> <span class="text-white">${msg.author}:</span> ${msg.content}`;
            log.prepend(d);
        });

        showTab('builder');
    </script>
</body>
</html>
