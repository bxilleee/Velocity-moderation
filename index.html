<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Velocity Moderation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #e2e8f0; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.4); border-radius: 1.25rem; padding: 1.5rem; }
        .active-tab { color: #818cf8 !important; border-top: 2px solid #818cf8; }
        @media (min-width: 768px) { .active-tab { border-top: none; border-left: 4px solid #818cf8; background: rgba(99, 102, 241, 0.1); } }
        select, input, textarea { background: #0f172a !important; border: 1px solid #334155 !important; border-radius: 0.75rem !important; padding: 0.75rem !important; outline: none; font-size: 0.875rem; width: 100%; color: white; }
    </style>
</head>
<body>

    <div class="flex flex-col md:flex-row h-screen overflow-hidden">
        <aside class="hidden md:flex w-72 bg-[#080c14] border-r border-slate-800 flex-col p-6">
            <div class="flex items-center gap-3 text-indigo-400 font-extrabold text-2xl mb-10"><i data-lucide="zap"></i> VELOCITY</div>
            <nav class="space-y-2">
                <button onclick="showTab('builder')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition"><i data-lucide="message-square"></i> Builder</button>
                <button onclick="showTab('mod')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition"><i data-lucide="shield-alert"></i> Moderation</button>
                <button onclick="showTab('analytics')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition"><i data-lucide="bar-chart-3"></i> Analytics</button>
                <button onclick="showTab('logs')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition"><i data-lucide="activity"></i> Logs</button>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 md:p-10 pb-24">
            
            <section id="builder" class="max-w-4xl mx-auto space-y-6">
                <h2 class="text-2xl font-bold">Message Builder</h2>
                <div class="glass-card space-y-4">
                    <select class="channel-list"></select>
                    <textarea id="msgInput" class="h-32 resize-none" placeholder="Broadcast content..."></textarea>
                    <button onclick="sendMsg()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">Send Message</button>
                </div>
            </section>

            <section id="mod" class="hidden max-w-4xl mx-auto space-y-6">
                <h2 class="text-2xl font-bold">Security Suite</h2>
                <div class="glass-card space-y-4">
                    <select class="user-list" id="modUser"></select>
                    <input id="modReason" placeholder="Reason for enforcement...">
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="modAction('kick')" class="bg-orange-600 p-2 rounded-lg text-xs font-bold">KICK</button>
                        <button onclick="modAction('ban')" class="bg-red-600 p-2 rounded-lg text-xs font-bold">BAN</button>
                    </div>
                </div>
            </section>

            <section id="analytics" class="hidden max-w-4xl mx-auto space-y-6">
                <h2 class="text-2xl font-bold">Server Growth & Invites</h2>
                
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="glass-card">
                        <h3 class="text-xs font-bold text-indigo-400 mb-4 uppercase flex items-center gap-2"><i data-lucide="user-plus"></i> Recent Joiners</h3>
                        <div id="joinerList" class="space-y-3 max-h-80 overflow-y-auto pr-2">
                            </div>
                    </div>

                    <div class="glass-card">
                        <h3 class="text-xs font-bold text-green-400 mb-4 uppercase flex items-center gap-2"><i data-lucide="link"></i> Active Invites</h3>
                        <div id="inviteList" class="space-y-3">
                            </div>
                    </div>
                </div>
            </section>

            <section id="logs" class="hidden max-w-4xl mx-auto">
                <h2 class="text-2xl font-bold mb-4">Live Activity</h2>
                <div id="logContainer" class="bg-black/40 border border-slate-800 rounded-2xl p-4 h-[60vh] overflow-y-auto font-mono text-xs"></div>
            </section>

        </main>

        <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-[#080c14] border-t border-slate-800 flex justify-around items-center h-20 z-50">
            <button onclick="showTab('builder')" id="m-builder" class="flex flex-col items-center gap-1 text-slate-500"><i data-lucide="message-square"></i><span class="text-[8px] font-bold">BUILD</span></button>
            <button onclick="showTab('mod')" id="m-mod" class="flex flex-col items-center gap-1 text-slate-500"><i data-lucide="shield-alert"></i><span class="text-[8px] font-bold">SAFETY</span></button>
            <button onclick="showTab('analytics')" id="m-analytics" class="flex flex-col items-center gap-1 text-slate-500"><i data-lucide="bar-chart-3"></i><span class="text-[8px] font-bold">GROWTH</span></button>
            <button onclick="showTab('logs')" id="m-logs" class="flex flex-col items-center gap-1 text-slate-500"><i data-lucide="activity"></i><span class="text-[8px] font-bold">LOGS</span></button>
        </nav>
    </div>

    <script>
        const socket = io();
        lucide.createIcons();

        socket.on('initData', (data) => {
            document.querySelectorAll('.channel-list').forEach(s => s.innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join(''));
            document.querySelectorAll('.user-list').forEach(s => s.innerHTML = data.members.map(m => `<option value="${m.id}">${m.tag}</option>`).join(''));
            
            // Populate Invites
            document.getElementById('inviteList').innerHTML = data.invites.map(i => `
                <div class="flex justify-between items-center bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                    <div><span class="text-green-400 font-bold">${i.code}</span> <p class="text-[10px] text-slate-500">By ${i.inviter}</p></div>
                    <div class="bg-slate-800 px-3 py-1 rounded-lg text-xs font-bold">${i.uses} uses</div>
                </div>
            `).join('');

            // Populate Joins
            document.getElementById('joinerList').innerHTML = data.recentJoins.map(renderJoiner).join('');
        });

        socket.on('newJoiner', (data) => {
            const list = document.getElementById('joinerList');
            list.insertAdjacentHTML('afterbegin', renderJoiner(data));
        });

        function renderJoiner(j) {
            return `
                <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-800 animate-pulse">
                    <div class="flex justify-between text-[11px] mb-1"><span class="text-indigo-400 font-bold">${j.tag}</span><span class="text-slate-500">${j.time}</span></div>
                    <div class="text-[10px] text-slate-400 italic">Used invite: <span class="text-indigo-300">${j.inviteCode}</span> (${j.inviter})</div>
                </div>
            `;
        }

        function showTab(tab) {
            ['builder', 'mod', 'analytics', 'logs'].forEach(t => {
                document.getElementById(t).classList.add('hidden');
                document.getElementById(`m-${t}`).classList.remove('active-tab');
            });
            document.getElementById(tab).classList.remove('hidden');
            document.getElementById(`m-${tab}`).classList.add('active-tab');
        }

        function sendMsg() {
            socket.emit('sendMessage', { channelId: document.querySelector('.channel-list').value, content: document.getElementById('msgInput').value });
            document.getElementById('msgInput').value = '';
        }

        function modAction(type) {
            socket.emit('moderation', { type, userId: document.getElementById('modUser').value, reason: document.getElementById('modReason').value });
        }

        socket.on('discordMessage', (msg) => {
            const d = document.createElement('div');
            d.innerHTML = `<span class="text-indigo-400">[#${msg.channel}]</span> <span class="text-white">${msg.author}:</span> ${msg.content}`;
            document.getElementById('logContainer').prepend(d);
        });

        showTab('builder');
    </script>
</body>
</html>
