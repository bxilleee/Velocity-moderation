<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Velocity | AI Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #e2e8f0; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.4); border-radius: 1.25rem; padding: 1.5rem; }
        .active-tab { color: #818cf8 !important; border-top: 2px solid #818cf8; }
        @media (min-width: 768px) { .active-tab { border-top: none; border-left: 4px solid #818cf8; background: rgba(99, 102, 241, 0.1); } }
        select, input, textarea { background: #0f172a !important; border: 1px solid #334155 !important; border-radius: 0.75rem !important; padding: 0.75rem !important; outline: none; color: white; width: 100%; }
        .pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>
    <div class="flex flex-col md:flex-row h-screen overflow-hidden">
        <aside class="hidden md:flex w-72 bg-[#080c14] border-r border-slate-800 flex-col p-6">
            <div class="flex items-center gap-3 text-indigo-400 font-extrabold text-2xl mb-10"><i data-lucide="zap"></i> VELOCITY</div>
            <nav class="space-y-2 flex-1">
                <button onclick="showTab('builder')" id="d-builder" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition"><i data-lucide="message-square"></i> Builder</button>
                <button onclick="showTab('tickets')" id="d-tickets" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition"><i data-lucide="ticket"></i> Tickets</button>
                <button onclick="showTab('mod')" id="d-mod" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition"><i data-lucide="shield-alert"></i> Security</button>
                <button onclick="showTab('files')" id="d-files" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition"><i data-lucide="folder-open"></i> Cloud Files</button>
                <button onclick="showTab('logs')" id="d-logs" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition"><i data-lucide="activity"></i> Logs</button>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 md:p-10 pb-28">
            <section id="tickets" class="hidden max-w-4xl mx-auto space-y-6">
                <h2 class="text-2xl font-bold">AI Support System</h2>
                <div class="glass-card space-y-4">
                    <h3 class="text-xs font-bold text-indigo-400 uppercase">System Setup</h3>
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase">Ticket Post Channel</label>
                            <select class="channel-list" id="ticketPostChannel"></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase">Staff Role ID (to @ping)</label>
                            <input id="staffRoleId" placeholder="Ex: 112233445566778899">
                        </div>
                    </div>
                    <button onclick="setupTickets()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold">Deploy Ticket Embed</button>
                </div>

                <div class="space-y-4">
                    <h3 class="text-xs font-bold text-red-400 uppercase flex items-center gap-2"><i data-lucide="alert-circle"></i> Human Attention Needed</h3>
                    <div id="humanTicketList" class="grid grid-cols-1 gap-4">
                        </div>
                </div>
            </section>

            </main>

        <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-[#080c14] border-t border-slate-800 flex justify-around items-center h-20 px-4 z-50">
            <button onclick="showTab('builder')" id="m-builder" class="flex flex-col items-center gap-1 text-slate-500"><i data-lucide="message-square"></i><span class="text-[9px] font-bold">BUILD</span></button>
            <button onclick="showTab('tickets')" id="m-tickets" class="flex flex-col items-center gap-1 text-slate-500"><i data-lucide="ticket"></i><span class="text-[9px] font-bold">AI</span></button>
            <button onclick="showTab('files')" id="m-files" class="flex flex-col items-center gap-1 text-slate-500"><i data-lucide="folder-open"></i><span class="text-[9px] font-bold">FILES</span></button>
            <button onclick="showTab('logs')" id="m-logs" class="flex flex-col items-center gap-1 text-slate-500"><i data-lucide="activity"></i><span class="text-[9px] font-bold">LOGS</span></button>
        </nav>
    </div>

    <script>
        const socket = io();
        lucide.createIcons();

        function showTab(t) {
            ['builder', 'tickets', 'mod', 'files', 'logs'].forEach(tab => {
                const el = document.getElementById(tab);
                if(el) el.classList.add('hidden');
                document.getElementById(`m-${tab}`).classList.remove('active-tab');
            });
            document.getElementById(t).classList.remove('hidden');
            document.getElementById(`m-${t}`).classList.add('active-tab');
            lucide.createIcons();
        }

        socket.on('initData', (data) => {
            // Populate selects (Same as before)
            document.querySelectorAll('.channel-list').forEach(s => s.innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join(''));
            document.getElementById('staffRoleId').value = data.config.staffRole || '';
            renderTickets(data.tickets);
        });

        socket.on('ticketUpdate', (tickets) => { renderTickets(tickets); });

        function renderTickets(tickets) {
            const list = document.getElementById('humanTicketList');
            const humanReqs = tickets.filter(t => t.needsHuman);
            if(humanReqs.length === 0) {
                list.innerHTML = `<div class="text-slate-600 text-xs italic text-center p-10 border border-dashed border-slate-800 rounded-xl">No active human support requests.</div>`;
                return;
            }
            list.innerHTML = humanReqs.map(t => `
                <div class="glass-card border-red-500/50 pulse-red flex justify-between items-center">
                    <div>
                        <p class="font-bold text-white">Ticket: ${t.username}</p>
                        <p class="text-[10px] text-red-400 font-bold uppercase tracking-widest">Human Requested</p>
                    </div>
                    <button class="bg-slate-800 px-4 py-2 rounded-lg text-xs font-bold" onclick="window.open('https://discord.com/channels/')">Open in Discord</button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function setupTickets() {
            socket.emit('setupTickets', {
                channelId: document.getElementById('ticketPostChannel').value,
                roleId: document.getElementById('staffRoleId').value
            });
            alert("Ticket System Deployed!");
        }

        // ... Keep all other functions (sendMsg, modAction, refreshFiles, etc) ...
        showTab('builder');
    </script>
</body>
</html>
