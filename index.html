<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Velocity | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .active-tab { color: #818cf8 !important; border-left: 4px solid #818cf8; background: rgba(99, 102, 241, 0.1); }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; width: 100%; border-radius: 12px; transition: 0.2s; color: #94a3b8; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .stat-card { background: #0f172a; border: 1px solid #1e293b; padding: 20px; border-radius: 20px; }
        select, input, textarea { background: #020617; border: 1px solid #334155; padding: 10px; border-radius: 10px; color: white; outline: none; width: 100%; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="w-64 border-r border-slate-800 p-6 flex flex-col hidden md:flex">
        <div class="text-indigo-500 font-bold text-2xl flex items-center gap-2 mb-10"><i data-lucide="zap"></i> VELOCITY</div>
        <nav class="space-y-2 flex-1">
            <button onclick="setTab('home')" id="btn-home" class="nav-item active-tab"><i data-lucide="home"></i> Home</button>
            <button onclick="setTab('mod')" id="btn-mod" class="nav-item"><i data-lucide="shield"></i> Security</button>
            <button onclick="setTab('tickets')" id="btn-tickets" class="nav-item"><i data-lucide="ticket"></i> AI Support</button>
            <button onclick="setTab('files')" id="btn-files" class="nav-item"><i data-lucide="file"></i> Files</button>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-6 md:p-10">
        
        <section id="tab-home" class="space-y-8">
            <h1 class="text-3xl font-bold">System Overview</h1>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="stat-card">
                    <p class="text-xs text-slate-500 font-bold uppercase">Members</p>
                    <h2 id="s-mem" class="text-2xl font-bold mt-1">--</h2>
                </div>
                <div class="stat-card">
                    <p class="text-xs text-slate-500 font-bold uppercase">Latency</p>
                    <h2 id="s-ping" class="text-2xl font-bold mt-1">--ms</h2>
                </div>
                <div class="stat-card">
                    <p class="text-xs text-slate-500 font-bold uppercase">Tickets</p>
                    <h2 id="s-tix" class="text-2xl font-bold mt-1">--</h2>
                </div>
                <div class="stat-card">
                    <p class="text-xs text-slate-500 font-bold uppercase">Files</p>
                    <h2 id="s-files" class="text-2xl font-bold mt-1">--</h2>
                </div>
            </div>

            <div class="grid md:grid-cols-3 gap-6">
                <div class="md:col-span-2 glass p-6 rounded-3xl h-80">
                    <canvas id="growthChart"></canvas>
                </div>
                <div class="glass p-6 rounded-3xl space-y-4">
                    <h3 class="font-bold flex items-center gap-2"><i data-lucide="brain"></i> Knowledge Brain</h3>
                    <textarea id="k-input" class="h-40 text-xs" placeholder="Rules, FAQ, etc..."></textarea>
                    <button onclick="saveK()" class="bg-indigo-600 w-full py-2 rounded-xl font-bold text-sm">Update AI</button>
                </div>
            </div>
        </section>

        <section id="tab-mod" class="hidden space-y-6">
            <h2 class="text-2xl font-bold">Security Suite</h2>
            <div class="glass p-6 rounded-3xl grid md:grid-cols-2 gap-4">
                <select id="m-user" class="user-list"></select>
                <input id="m-reason" placeholder="Reason for action...">
                <div class="grid grid-cols-3 gap-2 col-span-2">
                    <button onclick="mod('warn')" class="bg-yellow-600/20 text-yellow-500 p-2 rounded-xl font-bold">WARN</button>
                    <button onclick="mod('kick')" class="bg-orange-600/20 text-orange-500 p-2 rounded-xl font-bold">KICK</button>
                    <button onclick="mod('ban')" class="bg-red-600 p-2 rounded-xl font-bold">BAN</button>
                </div>
            </div>
        </section>

        <section id="tab-tickets" class="hidden space-y-6">
            <h2 class="text-2xl font-bold">Ticket Transcripts</h2>
            <div id="transcript-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section id="tab-files" class="hidden space-y-6">
            <h2 class="text-2xl font-bold">File Approval</h2>
            <div id="file-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

    </main>

    <script>
        const socket = io();
        let chart;

        function setTab(t) {
            ['home', 'mod', 'tickets', 'files'].forEach(id => {
                document.getElementById(`tab-${id}`).classList.add('hidden');
                document.getElementById(`btn-${id}`).classList.remove('active-tab');
            });
            document.getElementById(`tab-${t}`).classList.remove('hidden');
            document.getElementById(`btn-${t}`).classList.add('active-tab');
            lucide.createIcons();
        }

        socket.on('initData', (data) => {
            document.getElementById('k-input').value = data.knowledge || "";
            document.querySelector('.user-list').innerHTML = data.members.map(m => `<option value="${m.id}">${m.tag}</option>`).join('');
            updateStats(data.stats);
            renderChart(data.joinData);
            renderTickets(data.tickets);
            renderFiles(data.files);
        });

        socket.on('statsUpdate', (s) => updateStats(s));

        function updateStats(s) {
            document.getElementById('s-mem').innerText = s.members;
            document.getElementById('s-ping').innerText = s.ping;
            document.getElementById('s-tix').innerText = s.tickets;
            document.getElementById('s-files').innerText = s.files;
        }

        function renderChart(data) {
            const ctx = document.getElementById('growthChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'New Joins',
                        data: data.values,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function saveK() { socket.emit('saveKnowledge', document.getElementById('k-input').value); alert("Brain Saved!"); }
        function mod(type) { socket.emit('moderation', { type, userId: document.getElementById('m-user').value, reason: document.getElementById('m-reason').value }); }
        
        function renderTickets(data) {
            document.getElementById('transcript-list').innerHTML = data.transcripts.map(t => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center">
                    <div><p class="font-bold">${t.user}</p><p class="text-[10px] text-slate-500">${t.date}</p></div>
                    <button class="bg-indigo-600 text-[10px] px-3 py-1 rounded-lg">TRANSCRIPT</button>
                </div>
            `).join('');
        }

        function renderFiles(files) {
            document.getElementById('file-list').innerHTML = files.map(f => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center">
                    <p class="text-xs font-bold">${f.name}</p>
                    <button onclick="socket.emit('fileAction', {id: ${f.id}, status: 'approved'})" class="text-green-500"><i data-lucide="check"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        socket.on('connect', () => socket.emit('getInitData'));
        lucide.createIcons();
    </script>
</body>
</html>
